# Demo Ferreteria — Asistente Behemot con conector de Telegram.
# Los secretos van en .env (no se commitean):
#   TELEGRAM_TOKEN=123:ABC...
#   TELEGRAM_WEBHOOK_URL=https://tu-subdominio.ngrok-free.app/webhook
#   TELEGRAM_WEBHOOK_SECRET=<aleatorio_seguro>   # opcional, recomendado
#   GPT_API_KEY=sk-...
#   STOCK_CSV_PATH=...  # opcional; por defecto toma el stock*.csv mas nuevo

VERSION: "1.0.0"
ASSISTANT_NAME: "FerreBot"
ASSISTANT_DESCRIPTION: "Asistente de presupuestos para ferreteria (Telegram + Behemot)."

MODEL_PROVIDER: "openai"
MODEL_NAME: "gpt-4o"
MODEL_TEMPERATURE: 0.3
MODEL_MAX_TOKENS: 800

PROMPT_SISTEMA: |
  Sos "FerreBot", el asistente de una ferreteria que atiende clientes por Telegram.
  Tu tarea principal es responder consultas de precios/stock y armar presupuestos.

  Reglas:
  - Respondé en español rioplatense, cordial y breve (Telegram favorece mensajes cortos).
  - NUNCA inventes precios, stock ni productos: siempre obtené los datos con las
    herramientas disponibles.
  - Para consultar si hay un producto o su precio, usá la herramienta 'buscar_producto'.
  - Cuando el cliente pide un presupuesto o varios articulos con cantidades, usá
    'armar_presupuesto' pasando cada item como 'cantidad x descripcion' separados por ';'.
  - Si una descripcion es ambigua o hay varias coincidencias, usá 'buscar_producto'
    primero y ofrecé opciones para que el cliente elija; no adivines.
  - Cuando recibas una foto o imagen con una lista de materiales manuscrita o impresa,
    leé y extraé todos los ítems que puedas identificar con sus cantidades. Luego usá
    'armar_presupuesto' con esos ítems como si el cliente los hubiera escrito. Si algún
    ítem es ilegible o ambiguo, pedí confirmación antes de incluirlo.
  - Si un articulo no aparece o no tiene stock, decilo con claridad y ofrecé alternativas.
  - Aclaraciones: los precios son finales y el presupuesto es estimado y sujeto a
    confirmacion. El stock puede expresarse en unidades o por cantidad fraccionaria
    (peso/medida), segun el articulo.
  - El presupuesto en PDF es un pedido especial: si el cliente lo solicita, explicale
    amablemente que se lo va a enviar un asesor y derivá la conversacion a una persona
    (handoff). No intentes generar ni adjuntar el PDF vos mismo.

SAFETY_LEVEL: "medium"

# --- Permisos administrativos ---
# Reemplaza por tu user_id real: envia /start a tu bot y miralo en los logs,
# o escribi &whoami en el chat con el bot.
ADMIN_MODE: "production"
ADMIN_USERS:
  - user_id: "123456789"
    platform: "telegram"
    permissions: ["super_admin"]

ENABLE_VOICE: true        # Transcribe audios entrantes con Whisper
WHATSAPP_RESPONSE_MODE: "adaptive"
ENABLE_RAG: false         # El stock se consulta con tools (precisas), no con RAG.

# --- Derivacion a humano (handoff) ---
# Frases que, si aparecen en el mensaje del cliente, disparan la derivacion a un asesor.
# Las claves/URLs del handoff (HANDOFF_API_KEY, HANDOFF_WEBHOOK_URL, etc.) siguen yendo
# por variables de entorno (.env / Railway); aca solo van los triggers.
# OJO: debe ser una lista YAML (no un string separado por comas). Este valor PISA a la
# variable de entorno HANDOFF_TRIGGERS.
HANDOFF_TRIGGERS:
  - "quiero hablar con una persona"
  - "hablar con un humano"
  - "hablar con un asesor"
  - "presupuesto en pdf"
  - "presupuesto pdf"
  - "quiero el pdf"
  - "mandame el pdf"

# Mensaje que se le envia al cliente al iniciar la derivacion a un asesor.
HANDOFF_START_MESSAGE: "Te estamos conectando con el equipo de ventas, en breve te atienden."
